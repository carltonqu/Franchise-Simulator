services:
  - type: web
    name: franchise-simulator-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: franchise-simulator-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: franchise-simulator-backend
          property: url
